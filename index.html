<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <title>Frontend Mentor | QR code component</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">

  <style>
    :root {
      color-scheme: light;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Outfit', system-ui, sans-serif;
      background: hsl(212, 45%, 89%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    main {
      background: #fff;
      border-radius: 2rem;
      padding: 1.5rem;
      width: min(360px, 100%);
      max-width: 420px;
      box-shadow: 0 25px 45px hsla(218, 44%, 22%, 0.2);
      text-align: center;
    }

    .qr-card__image {
      width: 100%;
      border-radius: 1.25rem;
      display: block;
      margin-bottom: 1.5rem;
    }

    h1 {
      margin: 0;
      font-size: 1.75rem;
      color: hsl(218, 44%, 22%);
      line-height: 1.3;
    }

    p {
      margin-top: 1rem;
      margin-bottom: 0;
      color: hsl(216, 15%, 48%);
      font-size: 0.94rem;
      line-height: 1.6;
    }

    footer {
      margin-top: 1.75rem;
      font-size: 0.75rem;
      color: hsl(216, 15%, 48%);
    }

    footer a {
      color: hsl(228, 45%, 44%);
      text-decoration: none;
    }

    @media (min-width: 768px) {
      body {
        padding: 0;
        background: hsl(214, 64%, 92%);
      }

      main {
        padding: 2rem;
      }
    }
  </style>
</head>
<body>
  <main>
    <img class="qr-card__image" src="./images/image-qr-code.png" alt="QR code leading to Frontend Mentor">
    <h1>Improve your front-end skills by building projects</h1>
    <p>Scan the QR code to visit Frontend Mentor and take your coding skills to the next level.</p>
    <footer>
      Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank" rel="noreferrer">Frontend Mentor</a>. 
      Coded by <a href="https://www.frontendmentor.io/profile/yourusername" target="_blank" rel="noreferrer">Your Name Here</a>.
    </footer>
  </main>
</body>
</html>
